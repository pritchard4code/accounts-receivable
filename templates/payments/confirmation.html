<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Confirmed</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5 text-center">
  <div class="card shadow mx-auto" style="max-width:450px">
    <div class="card-body py-5">
      <div class="text-success display-1 mb-3"><i class="bi bi-check-circle-fill"></i></div>
      <h3 class="mb-2">Payment Confirmed</h3>
      <p class="text-muted">Payment <strong>{{ payment.payment_number }}</strong> of
        <strong>${{ "%.2f"|format(payment.amount|float) }}</strong> has been processed.</p>
      <p class="small text-muted">A receipt has been sent to {{ payment.customer.email }}.</p>
    </div>
  </div>
</div>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
</body>
</html>
