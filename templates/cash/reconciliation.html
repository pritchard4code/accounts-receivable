{% extends "base.html" %}
{% block title %}GL Reconciliation{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-arrow-left-right"></i> GL Reconciliation</h2>
<div class="row g-3 mb-4">
  <div class="col-md-3">
    <div class="card border-warning shadow-sm">
      <div class="card-body text-center">
        <div class="fs-3 fw-bold text-warning">{{ unsynced }}</div>
        <div class="text-muted small">Pending ERP Sync</div>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-danger shadow-sm">
      <div class="card-body text-center">
        <div class="fs-3 fw-bold text-danger">{{ failed }}</div>
        <div class="text-muted small">Failed Sync</div>
      </div>
    </div>
  </div>
</div>
<button class="btn btn-primary" id="syncBtn" onclick="syncGL()">
  <i class="bi bi-cloud-upload"></i> Sync Pending to ERP
</button>
<div id="syncResult" class="mt-3"></div>
{% endblock %}
{% block scripts %}
<script>
function syncGL() {
  document.getElementById('syncBtn').disabled = true;
  fetch('/cash/api/sync-gl', {method:'POST', headers:{'Content-Type':'application/json'}})
    .then(r => r.json())
    .then(d => {
      document.getElementById('syncResult').innerHTML =
        `<div class="alert alert-success">Synced: ${d.synced} | Errors: ${d.errors}</div>`;
      document.getElementById('syncBtn').disabled = false;
    });
}
</script>
{% endblock %}
