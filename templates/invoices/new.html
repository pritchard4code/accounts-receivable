{% extends "base.html" %}
{% block title %}New Invoice{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-plus-circle"></i> New Invoice</h2>
<form method="post" id="invoiceForm">
  <div class="row g-3">
    <div class="col-md-8">
      <div class="card shadow-sm mb-3">
        <div class="card-header bg-white fw-semibold">Invoice Details</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Customer *</label>
              <select name="customer_id" class="form-select" required>
                <option value="">— select —</option>
                {% for c in customers %}
                <option value="{{ c.id }}">{{ c.company_name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Issue Date *</label>
              <input type="date" name="issue_date" class="form-control"
                     value="{{ today.isoformat() }}" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">Invoice Type</label>
              <select name="invoice_type" class="form-select">
                <option value="one_time">One-time</option>
                <option value="recurring">Recurring</option>
                <option value="consolidated">Consolidated</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Tax Rate (%)</label>
              <input type="number" name="invoice_tax_pct" class="form-control"
                     value="0" min="0" max="100" step="0.01">
            </div>
            <div class="col-md-4">
              <label class="form-label">Source Type</label>
              <input type="text" name="source_type" class="form-control"
                     placeholder="e.g. sales_order">
            </div>
            <div class="col-md-4">
              <label class="form-label">Source Ref</label>
              <input type="text" name="source_ref" class="form-control"
                     placeholder="e.g. SO-1234">
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm mb-3">
        <div class="card-header bg-white fw-semibold d-flex justify-content-between">
          Line Items
          <button type="button" class="btn btn-sm btn-outline-primary" id="addLine">
            <i class="bi bi-plus"></i> Add Line
          </button>
        </div>
        <div class="card-body p-0">
          <table class="table table-sm mb-0" id="lineTable">
            <thead class="table-light">
              <tr>
                <th>Description</th>
                <th style="width:80px">Qty</th>
                <th style="width:120px">Unit Price</th>
                <th style="width:120px">Total</th>
                <th style="width:40px"></th>
              </tr>
            </thead>
            <tbody id="lineBody">
              <tr class="line-row">
                <td><input type="text" name="description[]" class="form-control form-control-sm" required></td>
                <td><input type="number" name="quantity[]" class="form-control form-control-sm qty" value="1" min="0" step="any"></td>
                <td><input type="number" name="unit_price[]" class="form-control form-control-sm price" value="0" min="0" step="0.01"></td>
                <td><input type="text" name="tax_rate[]" value="0" hidden><span class="line-total">$0.00</span></td>
                <td></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <label class="form-label">Notes</label>
          <textarea name="notes" class="form-control" rows="3"></textarea>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm sticky-top" style="top:70px">
        <div class="card-header bg-white fw-semibold">Summary</div>
        <div class="card-body">
          <div class="d-flex justify-content-between mb-1">
            <span>Subtotal</span><span id="subtotal">$0.00</span>
          </div>
          <input type="hidden" name="subtotal" id="subtotalInput" value="0">
          <div class="d-flex justify-content-between mb-1">
            <span>Tax</span><span id="taxAmt">$0.00</span>
          </div>
          <hr>
          <div class="d-flex justify-content-between fw-bold">
            <span>Total</span><span id="grandTotal">$0.00</span>
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-3">
            <i class="bi bi-check2"></i> Create Invoice
          </button>
          <a href="{{ url_for('invoices.list_invoices') }}" class="btn btn-link w-100 mt-1">Cancel</a>
        </div>
      </div>
    </div>
  </div>
</form>
{% endblock %}

{% block scripts %}
<script>
function recalc() {
  let sub = 0;
  document.querySelectorAll('.line-row').forEach(row => {
    const qty = parseFloat(row.querySelector('.qty').value) || 0;
    const price = parseFloat(row.querySelector('.price').value) || 0;
    const total = qty * price;
    row.querySelector('.line-total').textContent = '$' + total.toFixed(2);
    sub += total;
  });
  const taxPct = parseFloat(document.querySelector('[name=invoice_tax_pct]').value) || 0;
  const tax = sub * taxPct / 100;
  document.getElementById('subtotal').textContent = '$' + sub.toFixed(2);
  document.getElementById('subtotalInput').value = sub.toFixed(2);
  document.getElementById('taxAmt').textContent = '$' + tax.toFixed(2);
  document.getElementById('grandTotal').textContent = '$' + (sub + tax).toFixed(2);
}

document.getElementById('lineBody').addEventListener('input', recalc);
document.querySelector('[name=invoice_tax_pct]').addEventListener('input', recalc);

document.getElementById('addLine').addEventListener('click', () => {
  const clone = document.querySelector('.line-row').cloneNode(true);
  clone.querySelectorAll('input[type=text],input[type=number]').forEach(i => {
    if (i.name === 'quantity[]') i.value = 1;
    else if (i.name === 'unit_price[]') i.value = 0;
    else i.value = '';
  });
  clone.querySelector('.line-total').textContent = '$0.00';
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'btn btn-sm btn-outline-danger';
  btn.innerHTML = '<i class="bi bi-trash"></i>';
  btn.onclick = () => { clone.remove(); recalc(); };
  clone.querySelector('td:last-child').appendChild(btn);
  document.getElementById('lineBody').appendChild(clone);
});
</script>
{% endblock %}
